<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Search Results</title>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Times New Roman', serif;
      font-size: 14px;
      background: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── INFO BAR ── */
    .info-bar {
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      padding: 14px 20px;
      flex-shrink: 0;
    }

    .info-bar h2 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .info-bar p {
      font-size: 13px;
      color: #444;
      font-style: italic;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Times New Roman', serif;
      font-size: 13px;
    }

    thead th {
      background: #d4d4d4;
      border: 1px solid #999;
      padding: 8px 10px;
      text-align: left;
      font-weight: bold;
      white-space: nowrap;
    }

    tbody td {
      border: 1px solid #ccc;
      padding: 7px 10px;
      vertical-align: middle;
    }

    tbody tr:hover { background: #f5f5f5; }

    /* ── OPEN BUTTON ── */
    .open-btn {
      padding: 3px 12px;
      font-family: 'Times New Roman', serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid #999;
      background: #d4d4d4;
    }
    .open-btn:hover { background: #c0c0c0; }
    .open-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      background: #eee;
    }

    /* ── STATES ── */
    .empty-row td {
      text-align: center;
      color: #888;
      padding: 30px;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #666;
      font-style: italic;
    }

    .error-box {
      display: none;
      margin: 20px;
      padding: 14px;
      border: 1px solid #e0a0a0;
      background: #fdecec;
      color: #a02020;
      font-weight: bold;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      background: #f0f0f0;
      border-top: 1px solid #ccc;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .bottom-bar button {
      padding: 6px 18px;
      font-family: 'Times New Roman', serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid #999;
      background: #d4d4d4;
    }
    .bottom-bar button:hover { background: #c0c0c0; }

  </style>
</head>
<body>

  <!-- INFO BAR -->
  <div class="info-bar">
    <h2>Search Results</h2>
    <p id="search-info">Loading...</p>
  </div>

  <!-- TABLE -->
  <div class="table-area">
    <div class="loading" id="loading">Searching...</div>
    <div class="error-box" id="error-box">
      Could not connect to the server. Make sure <code>node server.js</code> is running.
    </div>

    <table id="results-table" style="display:none">
      <thead>
        <tr>
          <th>Project Name</th>
          <th>Sub System</th>
          <th>Mission</th>
          <th>Document Type</th>
          <th>Version</th>
          <th>Version Date</th>
          <th>Submission Date</th>
          <th>File Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button onclick="window.close()">Close</button>
  </div>

  <script>

    // Base URL of the Node.js server - change this if hosted elsewhere
    const SERVER_URL = 'http://localhost:3000';

    // ── Read search params from URL ───────────────
    const params       = new URLSearchParams(window.location.search);
    const projectName  = params.get('projectName') || '';
    const subsystem    = params.get('subsystem')   || '';
    const mission      = params.get('mission')     || '';
    const version      = params.get('version')     || '';
    const docType      = params.get('docType')     || 'All';

    // ── Show search criteria at top ───────────────
    document.getElementById('search-info').textContent =
      'Project: '   + projectName +
      '   |   Sub System: ' + subsystem +
      '   |   Mission: '    + mission   +
      '   |   Version: '    + version   +
      '   |   Document: '   + docType;

    // ── Fetch results from server ─────────────────
    async function loadResults() {
      try {
        const query = new URLSearchParams({
          projectName, subsystem, mission, version, docType
        });

        const response = await fetch(SERVER_URL + '/search?' + query.toString());

        if (!response.ok) throw new Error('Server returned an error');

        const results = await response.json();

        document.getElementById('loading').style.display       = 'none';
        document.getElementById('results-table').style.display = 'table';

        const tbody = document.getElementById('results-body');
        tbody.innerHTML = '';

        if (results.length === 0) {
          tbody.innerHTML = `
            <tr class="empty-row">
              <td colspan="9">
                No documents found for the given search criteria.
              </td>
            </tr>`;
          return;
        }

        results.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.projectName      || ''}</td>
            <td>${row.projectSubsystem || ''}</td>
            <td>${row.mission          || ''}</td>
            <td>${row.docType          || ''}</td>
            <td>${row.version          || ''}</td>
            <td>${row.versionDate      || ''}</td>
            <td>${row.submissionDate   || ''}</td>
            <td>${row.fileName || row.filePath || 'No file'}</td>
            <td></td>`;

          // Build the Open button safely via JS (avoids broken paths/quotes in onclick strings)
          const actionCell = tr.children[tr.children.length - 1];
          const openBtn = document.createElement('button');
          openBtn.className = 'open-btn';
          openBtn.textContent = 'Open';

          const hasFile = !!row.filePath;
          if (!hasFile) {
            openBtn.disabled = true;
            openBtn.textContent = 'No File';
          } else {
            openBtn.addEventListener('click', () => {
              // row.filePath looks like "/uploads/171234-srs.pdf"
              window.open(SERVER_URL + row.filePath, '_blank');
            });
          }

          actionCell.appendChild(openBtn);
          tbody.appendChild(tr);
        });

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-box').style.display = 'block';
        console.error('Search error:', err);
      }
    }

    // Load on page open
    loadResults();

  </script>
</body>
</html>
